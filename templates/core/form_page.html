<!doctype html>
{% load static %}
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyMate — {{ title }}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body class="auth">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{% url 'dashboard' %}">
        <div class="logo">
          <img src="{% static 'imgs/logo.png' %}" alt="Logo StudyMate">
        </div>
        <div>StudyMate</div>
      </a>

      <div class="btn-row">
        <a class="btn btn-ghost" href="{% url 'dashboard' %}">Dashboard</a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="card pad auth-card">
        <h1 class="h2">{{ title }}</h1>

        <form method="post" class="form">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="btn-row">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-ghost" href="{% url 'dashboard' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
